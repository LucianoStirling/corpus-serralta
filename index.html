<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Corpus Serralta</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<style>
/* ─────────────────────────────────────────────────────────────
   CORPUS SERRALTA, version GitHub Pages
   Données via fetch() depuis Apps Script JSON API (?api=1)
   Pas de Caja, @media natifs, responsive standard
───────────────────────────────────────────────────────────── */
:root{
  --ink:#1a1a1a;--mid:#555;--light:#999;--rule:#e8e8e6;
  --bg:#f7f7f5;--white:#fff;--accent:#c8a96e;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--ink)}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;justify-content:space-between;
  padding:16px 32px;background:var(--white);border-bottom:1px solid var(--rule);
  position:sticky;top:0;z-index:20}
.topbar-title{font-size:18px;font-weight:300;letter-spacing:-.3px;cursor:pointer}
.topbar-count{font-size:13px;color:var(--mid);margin-left:8px;cursor:pointer;transition:color .15s}.topbar-count:hover{color:var(--ink)}
.topbar-back{display:inline-flex;align-items:center;gap:6px;margin-left:14px}
.tback{font-size:11px;color:var(--mid);cursor:pointer;text-decoration:none;opacity:.6}
.tback:hover{opacity:1;color:var(--ink)}
.tback-sep{font-size:11px;color:var(--light)}
.topbar-nav{font-size:13px;color:var(--mid);cursor:pointer;transition:color .15s}
.topbar-nav:hover{color:var(--ink)}

/* ── TABS ── */
.tabs{display:flex;gap:0;border-bottom:2px solid var(--rule);
  padding:0 32px;background:var(--white);position:sticky;top:57px;z-index:19}
.tab{padding:14px 24px;font-size:13px;cursor:pointer;color:var(--light);
  border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.tab.active{color:var(--ink);border-color:var(--ink);font-weight:500}

/* ── ENTRY VIEWS ── */
.entry-view{padding:40px 32px}

/* ── CONTEXT ── */
.ctx-label{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--light);margin-bottom:32px}
.ctx-divider{border:none;border-top:1px solid var(--rule);margin:40px 0 32px}
.ctx-subtitle{font-size:13px;color:var(--light);margin-bottom:20px;letter-spacing:.3px}

/* ── CHRONO LAYOUT ── */
.chrono-bio-row{display:flex;justify-content:center;align-items:flex-start;gap:12px}
.chrono-bio-wrap{position:relative;display:inline-block;flex-shrink:0}
.chrono-bio-wrap img{max-height:78vh;width:auto;display:block;border:1px solid var(--rule)}
.chrono-yr-col{position:relative;width:320px;align-self:stretch;flex-shrink:0;margin-left:6px}
/* quinconce : colonne A (gauche) et colonne B (droite) */
.chrono-yr-btn{position:absolute;width:155px;padding:4px 9px;
  border:1px solid #c8c4bc;background:#f0eeea;color:var(--ink);
  cursor:pointer;transform:translateY(-50%);transition:all .12s;
  border-radius:2px;box-sizing:border-box;display:flex;flex-direction:column;
  align-items:flex-start;gap:1px}
.chrono-yr-btn.col-a{left:0}
.chrono-yr-btn.col-b{right:0}
.chrono-yr-btn:hover{background:#b83228;color:#fff;border-color:#b83228}
.yr-n{font-size:11px;font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap}
.yr-e{font-size:9px;color:#888;font-style:italic;line-height:1.3;white-space:normal}
.chrono-yr-btn:hover .yr-e{color:#fdd;font-style:normal}
.bio-caption{font-size:10px;color:var(--light);font-style:italic;line-height:1.5;
  margin:8px 0 0;text-align:center;max-width:100%}
.bio-img-wrap{cursor:zoom-in;margin-bottom:12px;border:1px solid var(--rule)}
.bio-img-wrap img{width:100%;display:block}
.bio-placeholder{width:100%;aspect-ratio:3/4;background:var(--rule);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;color:var(--light);text-align:center;padding:16px;line-height:1.5}
.bio-caption{font-size:10px;color:var(--light);font-style:italic;line-height:1.5}

/* ── PERIODS ── */
.period-list{margin-bottom:0}
.period-row{display:grid;grid-template-columns:130px 1fr;gap:32px;
  padding:22px 0;border-bottom:1px solid var(--rule);cursor:pointer;transition:background .12s}
.period-row:first-child{border-top:1px solid var(--rule)}
.period-row:hover{background:rgba(0,0,0,.02)}
.period-date{font-size:12px;color:var(--light);padding-top:3px;white-space:nowrap;font-variant-numeric:tabular-nums}
.period-title{font-size:15px;font-weight:500;margin-bottom:6px;letter-spacing:-.2px}
.period-desc{font-size:13px;color:var(--mid);line-height:1.75}
.period-count{font-size:11px;color:var(--accent);margin-top:6px}

/* ── SERIES MAJOR ── */
.series-major-grid{display:grid;grid-template-columns:repeat(5,1fr);
  gap:1px;background:var(--rule);margin-bottom:2px}
.smc{background:var(--white);padding:22px 20px;cursor:pointer;transition:background .12s}
.smc:hover{background:var(--bg)}
.smc-title{font-size:14px;font-weight:500;margin-bottom:4px}
.smc-n{font-size:38px;font-weight:300;color:var(--accent);line-height:1.1;
  margin-bottom:8px;font-variant-numeric:tabular-nums}
.smc-desc{font-size:12px;color:var(--mid);line-height:1.65}

/* ── ALL SERIES ── */
.series-all-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.entry-card{background:var(--white);border:1px solid var(--rule);border-radius:3px;
  padding:20px;cursor:pointer;transition:all .15s;text-align:center}
.entry-card:hover{border-color:var(--ink);transform:translateY(-2px)}
.entry-card-title{font-size:16px;font-weight:300;margin-bottom:4px}
.entry-card-count{font-size:12px;color:var(--light)}
.entry-card-desc{font-size:11px;color:var(--light);line-height:1.5;margin-top:8px;text-align:left}

/* ── FILTERS ── */
.filters{padding:8px 32px;background:var(--white);border-bottom:1px solid var(--rule);
  display:flex;flex-direction:column;gap:5px;position:sticky;top:57px;z-index:18}
.filter-row{display:flex;align-items:center;gap:8px;min-width:0}
.filter-chips-scroll{display:flex;gap:6px;overflow-x:auto;flex-wrap:nowrap;
  scrollbar-width:none;-ms-overflow-style:none;padding-bottom:1px;min-width:0}
.filter-chips-scroll::-webkit-scrollbar{display:none}
.filter-label{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--light);
  white-space:nowrap;flex-shrink:0;width:46px}
.chip{font-size:11px;padding:4px 12px;border:1px solid var(--rule);border-radius:20px;
  cursor:pointer;background:var(--white);color:var(--mid);transition:all .15s;white-space:nowrap;
  flex-shrink:0;-webkit-tap-highlight-color:transparent}
.chip:hover{border-color:var(--mid)}
.chip.active{background:var(--ink);color:var(--white);border-color:var(--ink)}
.chip-vsep{width:1px;background:rgba(0,0,0,.15);height:16px;flex-shrink:0;align-self:center;margin:0 4px}
.period-chips{margin:8px 0 4px;display:flex;flex-wrap:wrap;gap:4px}
.period-serie-chip{display:inline-flex;align-items:center;gap:4px;background:var(--white);border:1px solid var(--rule);border-radius:3px;padding:3px 8px;font-size:10px;color:var(--mid);cursor:pointer;transition:background .15s}
.period-serie-chip:hover{background:var(--ink);color:var(--white);border-color:var(--ink)}
.psc-cnt{font-weight:500;color:var(--gold)}
.period-serie-chip:hover .psc-cnt{color:#ffd}
.smc-range{font-size:10px;color:var(--light);margin:2px 0 6px;letter-spacing:.2px}
.ec-range{font-size:10px;color:var(--light);margin:1px 0 4px}
.ctx-intro{font-size:13px;color:var(--mid);line-height:1.85;margin-bottom:28px}
.ctx-intro p{margin:0 0 14px}
.ctx-intro p:last-child{margin-bottom:0}
.ctx-note{font-size:12px;color:var(--mid);line-height:1.75;margin-bottom:24px;
  padding:12px 16px;background:rgba(0,0,0,.025);border-left:2px solid var(--rule);border-radius:0 3px 3px 0}
.chip[data-admin]{display:none}
body.admin-on .chip[data-admin]{display:inline-flex}
.chip-vsep[data-admin]{display:none}
body.admin-on .chip-vsep[data-admin]{display:inline-block}
.filter-search-row{display:flex;align-items:center;gap:8px;padding:2px 0}
.filter-search{flex:1;border:1px solid var(--rule);border-radius:20px;
  padding:5px 14px;font-size:12px;font-family:inherit;color:var(--ink);
  background:var(--white);outline:none;transition:border-color .15s;min-width:0}
.filter-search:focus{border-color:var(--mid)}
.filter-search::placeholder{color:var(--light)}
.filter-meta{display:flex;align-items:center;gap:12px;padding:2px 0 4px}
#filter-count{font-size:11px;color:var(--light)}
.clear-btn{font-size:11px;color:var(--accent);cursor:pointer;text-decoration:underline;white-space:nowrap}

/* ── GALLERY ── */
.gallery-view{display:none}
.gallery-view.active{display:block}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:2px;padding:2px}
.card{background:var(--white);display:flex;flex-direction:column;position:relative}
/* ── VUE COMPACTE (défaut) / VUE COMPLÈTE (toggle) ── */
/* Par défaut : image + tags + technique — ico/crit masqués sauf si .full-mode */
.card-ico{display:none}
.card-crit{display:none}
.card-body{padding:6px 10px;gap:4px}
.card-ref{font-size:11px}
.tag{font-size:10px;padding:1px 6px}
.card-verify{font-size:10px;padding:2px 6px;margin-top:2px}
.card-verifiers{font-size:9px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:2px;padding:2px}
/* Mode complet : tout visible */
body.full-mode .card-ico{display:block}
body.full-mode .card-crit{display:block}
body.full-mode .card-body{padding:14px;gap:6px}
body.full-mode .card-ref{font-size:12px}
body.full-mode .tag{font-size:10px;padding:2px 8px}
body.full-mode .card-verify{font-size:10px;padding:2px 8px;margin-top:6px}
body.full-mode .card-verifiers{font-size:10px}
body.full-mode .grid{grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:2px}
.compact-btn{font-size:11px;color:var(--mid);cursor:pointer;white-space:nowrap;
  padding:1px 8px;border:1px solid var(--rule);border-radius:10px;user-select:none}
.compact-btn.on{color:var(--ink);border-color:var(--ink);background:#f0f0ec;font-weight:500}
/* ── TAG EDITOR DRAWER ── */
#tag-panel{display:none;position:fixed;inset:0;z-index:300}
#tag-panel.open{display:flex}
#tag-overlay{flex:1;background:rgba(0,0,0,.35);cursor:pointer}
#tag-drawer{width:300px;background:var(--white);display:flex;flex-direction:column;
  border-left:1px solid var(--rule);overflow:hidden;height:100%}
#tag-drawer-header{padding:14px 16px;border-bottom:1px solid var(--rule);
  display:flex;justify-content:space-between;align-items:center;gap:8px;flex-shrink:0}
#tag-drawer-ref{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tag-close-btn{background:none;border:none;cursor:pointer;font-size:18px;
  color:var(--mid);padding:0;flex-shrink:0;line-height:1}
#tag-drawer-img{height:110px;overflow:hidden;background:#f0f0ee;flex-shrink:0;cursor:zoom-in}
#tag-drawer-img img{width:100%;height:100%;object-fit:contain}
#tag-drawer-info{padding:6px 16px;font-size:11px;color:var(--light);
  border-bottom:1px solid var(--rule);display:flex;justify-content:space-between;
  align-items:center;flex-shrink:0}
#tag-count{font-weight:600;color:var(--ink)}
#tag-list{flex:1;overflow-y:auto;padding:4px 0}
.tag-check-row{display:flex;align-items:center;gap:10px;padding:7px 16px;
  cursor:pointer;font-size:12px;color:var(--ink);transition:background .1s;user-select:none}
.tag-check-row:hover{background:var(--bg)}
.tag-check-row.checked{color:#2a7a3b;font-weight:500}
.tag-check-row input{accent-color:#2a7a3b;flex-shrink:0;width:14px;height:14px;cursor:pointer}
.tag-pinned{background:#fafaf8}
.tag-separator{height:1px;background:var(--rule);margin:4px 0}
.tag-required-err{font-size:11px;color:#c00;padding:4px 16px;display:none}
#tag-drawer-footer{padding:12px 16px;border-top:1px solid var(--rule);
  display:flex;gap:8px;justify-content:flex-end;flex-shrink:0}
#tag-save-btn{background:var(--ink);color:var(--white);border:none;
  padding:7px 20px;border-radius:3px;cursor:pointer;font-size:13px}
#tag-save-btn:disabled{opacity:.5;cursor:default}
.tag-cancel-btn{background:none;border:1px solid var(--rule);color:var(--mid);
  padding:7px 16px;border-radius:3px;cursor:pointer;font-size:13px}
.card-tag-edit{display:none;position:absolute;top:36px;right:8px;width:26px;height:26px;
  border-radius:50%;background:rgba(255,255,255,.9);border:1px solid var(--rule);
  cursor:pointer;align-items:center;justify-content:center;font-size:13px;z-index:2;line-height:1}
body.admin-on .card-tag-edit{display:flex}
.card-tag-edit:hover{background:var(--ink);color:var(--white);border-color:var(--ink)}
/* Nouveau tag */
#tag-new-row{display:flex;gap:6px;padding:8px 16px;border-top:1px solid var(--rule);flex-shrink:0}
#tag-new-input{flex:1;border:1px solid var(--rule);border-radius:3px;
  padding:5px 8px;font-size:12px;font-family:inherit;outline:none}
#tag-new-input:focus{border-color:var(--ink)}
#tag-new-btn{background:var(--ink);color:var(--white);border:none;border-radius:3px;
  padding:5px 10px;cursor:pointer;font-size:13px;flex-shrink:0}
#tag-new-btn:hover{background:#333}
#tag-new-err{font-size:10px;color:#c00;padding:0 16px 6px;display:none;flex-shrink:0}
.card-img{overflow:hidden;background:#f0f0ee;cursor:zoom-in;aspect-ratio:4/3}
.card-img img{width:100%;height:100%;display:block;transition:opacity .2s;object-fit:cover}
.card-img img:hover{opacity:.9}
.card-body{padding:14px;flex:1;display:flex;flex-direction:column;gap:6px}
.card-tags{display:flex;flex-wrap:wrap;gap:4px}
.tag{font-size:10px;padding:2px 8px;border-radius:12px;background:#f0f0ec;color:var(--mid);
  cursor:pointer;transition:background .1s}
.tag:hover{background:#e0e0db}
.card-ref{font-size:12px;font-weight:600}
.card-tech{font-size:11px;color:var(--light)}
.card-ico{font-size:12px;color:var(--mid);line-height:1.6;font-family:Georgia,serif}
.card-crit{font-size:11px;color:var(--light);line-height:1.6;font-style:italic;
  font-family:Georgia,serif;border-top:1px solid var(--rule);padding-top:6px;margin-top:2px}
.card-edit{position:absolute;top:8px;right:8px;width:26px;height:26px;border-radius:50%;
  background:rgba(255,255,255,.9);border:1px solid var(--rule);cursor:pointer;
  align-items:center;justify-content:center;font-size:12px;color:var(--mid);
  text-decoration:none;display:none}
body.admin-on .card-edit{display:flex}
.card-edit:hover{background:var(--ink);color:var(--white);border-color:var(--ink)}

/* ── LIGHTBOX ── */
#lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:100;
  align-items:center;justify-content:center}
#lb.open{display:flex}
#lb img{max-width:90vw;max-height:90vh;object-fit:contain}
#lb-close{position:fixed;top:18px;right:22px;color:#888;font-size:26px;
  cursor:pointer;background:none;border:none}

/* ── LOADING ── */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:16px;z-index:200}
.spinner{width:32px;height:32px;border:2px solid var(--rule);
  border-top-color:var(--ink);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{font-size:13px;color:var(--light)}
#loading small{font-size:10px;color:#bbb;margin-top:8px}
.err-msg{color:#c00;font-size:13px;max-width:400px;text-align:center;line-height:1.6}

/* ── ADMIN ── */
.lock-btn{background:none;border:none;cursor:pointer;font-size:16px;padding:0 0 0 16px;
  opacity:.4;transition:opacity .2s;line-height:1}
.lock-btn:hover,.lock-btn.unlocked{opacity:1}
.lock-btn.unlocked{filter:sepia(1) saturate(3) hue-rotate(90deg)}
.admin-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;
  display:flex;align-items:center;justify-content:center}
.admin-box{background:var(--white);border:1px solid var(--rule);border-radius:4px;
  padding:28px 32px;width:280px;max-width:90vw}
.admin-title{font-size:14px;font-weight:400;margin-bottom:16px}
.admin-input{width:100%;border:1px solid var(--rule);border-radius:3px;
  padding:8px 10px;font-size:14px;outline:none;box-sizing:border-box}
.admin-input:focus{border-color:var(--ink)}
.admin-err{font-size:12px;color:#c00;min-height:18px;margin-top:6px}
.admin-btns{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}
.admin-cancel,.admin-ok{border:1px solid var(--rule);background:none;
  padding:6px 16px;border-radius:3px;cursor:pointer;font-size:13px}
.admin-ok{background:var(--ink);color:var(--white);border-color:var(--ink)}

/* ── VÉRIFICATION ── */
.card-ver-badge{display:none;position:absolute;top:8px;left:8px;width:22px;height:22px;
  border-radius:50%;background:#2a7a3b;color:#fff;font-size:10px;font-weight:700;
  align-items:center;justify-content:center;z-index:2}
body.admin-on .card.verified .card-ver-badge{display:flex}
.card-verify{display:none;font-size:10px;color:var(--light);background:none;
  border:1px solid var(--rule);border-radius:3px;padding:2px 8px;cursor:pointer;
  margin-top:6px;transition:all .15s;text-align:left}
body.admin-on .card-verify{display:inline-block}
.card-verify:hover:not(:disabled){background:#2a7a3b;color:#fff;border-color:#2a7a3b}
body.admin-on .card.verified .card-verify{color:#2a7a3b;border-color:#2a7a3b;background:#f0fff4}
body.admin-on .card.verified-by-me .card-verify{color:#999;border-color:#e0e0e0;background:#f8f8f8;cursor:default}
.card-verifiers{display:none;font-size:10px;color:var(--light);margin-top:2px;line-height:1.4}
body.admin-on .card-verifiers{display:block}
body.hide-verified .card.verified{display:none}
.hide-ver-btn{font-size:11px;color:var(--mid);cursor:pointer;white-space:nowrap;
  padding:1px 8px;border:1px solid var(--rule);border-radius:10px}
.hide-ver-btn.on{color:#2a7a3b;border-color:#2a7a3b;background:#f0fff4;font-weight:500}
.ver-count{font-size:11px;color:#2a7a3b;white-space:nowrap}
.admin-only{display:none}
body.admin-on .admin-only{display:inline}
#topbar-version{display:none;font-size:10px;color:var(--light);margin-left:8px;letter-spacing:.3px}
body.admin-on #topbar-version{display:inline}
/* ── LEADERBOARD ── */
.leaderboard-row{display:none;align-items:center;gap:6px;padding:3px 0 2px;flex-wrap:wrap}
body.admin-on .leaderboard-row{display:flex}
.lb-medal{font-size:11px;white-space:nowrap;color:var(--mid)}
.lb-medal strong{color:var(--ink);font-weight:600}

/* ── RESPONSIVE — @media natifs (pas de Caja ici) ── */
@media (max-width:800px){
  .topbar{padding:12px 16px}
  .topbar-title{font-size:17px}
  .topbar-count{font-size:12px}
  .tabs{padding:0 16px;top:53px}
  .tab{padding:12px 16px;font-size:13px}
  .filters{padding:6px 16px;top:53px}
  .filter-label{width:42px;font-size:10px}
  .chip{font-size:12px;padding:5px 10px}
  .entry-view{padding:28px 16px}
  .chrono-layout{grid-template-columns:1fr;gap:24px}
  .chrono-bio{position:static}
  .bio-img-wrap img{max-height:65vw;object-fit:contain}
  .series-major-grid{grid-template-columns:repeat(2,1fr)}
  .series-all-grid{grid-template-columns:repeat(2,1fr)}
  .grid{grid-template-columns:repeat(2,1fr)}
  .period-row{gap:16px}
  .period-date{min-width:80px}
}
@media (max-width:480px){
  .grid{grid-template-columns:1fr}
  .series-major-grid{grid-template-columns:1fr}
  .series-all-grid{grid-template-columns:1fr}
  .chrono-layout{grid-template-columns:1fr}
  .chip{font-size:13px;padding:6px 12px;min-height:36px}
  .filter-search{font-size:14px}
  .card-ref{font-size:14px}
  .card-tech,.card-ico{font-size:13px}
  .period-title{font-size:16px}
  .period-desc{font-size:13px}
  .topbar-nav{display:none} /* trop étroit, nav par onglets suffit */

/* ── Startup — fetch JSON API ── */
function startApp() {
  var msg = document.getElementById('load-msg');
  var sub = document.getElementById('load-sub');
  if (sub) sub.textContent = 'Connexion au catalogue…';

  fetch(API_URL)
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function(resp) {
      if (msg) msg.textContent = 'Chargement de ' + resp.items.length + ' œuvres…';
      ITEMS = resp.items.map(function(a) {
        return {ref:a[0],annee:a[1],technique:a[2],support:a[3],
                serie:a[4],ico:a[5],crit:a[6],image_url:a[7],_row:a[8],verifie:a[9]||''};

      SHEET_ID    = resp.sheetId;
      GID         = resp.gid;
      APP_VERSION = resp.version || '';
      init();

    .catch(function(err) {
      if (msg) {

    desc: 'Les grandes séries ne s’inventent pas progressivement, elles sont toutes présentes en 1976. SCIENS-ART, Personnages Filiformes, Animaux, Habillés, Paquebot : tout est là en 1976. La couleur explose aussi (aplats rose/rouge/vert/bleu), le changement de registre qui annonce 1977, pas 1975.' },
  { date: '1977 – 1978', title: 'Le débordement',

  { date: '1979 – 1982', title: 'Le repli',

    desc: 'Contraction délibérée. Le Personnage Filiforme s’autonomise, la palette se refroidit. En 1982, minimum absolu : quelques dessins et un document dactylographié inclus dans le corpus au même titre qu’un dessin. Ce n’est pas un creux : c’est l’architecte théoricien qui reprend la main. Dans le même temps, les premiers visages-sujets apparaissent : plus un visage dans une composition, un visage qui est la composition.' },

var SERIES_MAJOR = [
  { name: 'Animaux', desc: 'Chevaux, taureaux, oiseaux, chiens... Souvent en tension ou fusion avec le nu humain.' },

/* ── Count helpers ── */
function topSeriesForYears(years, n) {
  var counts = {}, PINNED = PINNED_TAGS;
  for (var i=0; i<ITEMS.length; i++) {
    if (years.indexOf(String(ITEMS[i].annee)) === -1) continue;
    var tags = (ITEMS[i].serie||'').split('|');
    for (var j=0; j<tags.length; j++) {
      var t = tags[j].trim();
      if (t && PINNED.indexOf(t) === -1) counts[t] = (counts[t]||0)+1;
    }
  }
  var arr = [];
  for (var k in counts) if (Object.prototype.hasOwnProperty.call(counts,k)) arr.push([k,counts[k]]);
  arr.sort(function(a,b){return b[1]-a[1];});
  return arr.slice(0,n);
}
function seriesYearRange(name) {
  var yrs = [], yc = {};
  for (var i=0; i<ITEMS.length; i++) {
    var tags = (ITEMS[i].serie||'').split('|').map(function(t){return t.trim();});
    if (tags.indexOf(name) === -1) continue;
    var y = parseInt(String(ITEMS[i].annee));
    if (!isNaN(y)) { yrs.push(y); yc[y] = (yc[y]||0)+1; }
  }
  if (!yrs.length) return null;
  var mn=Math.min.apply(null,yrs), mx=Math.max.apply(null,yrs), pk=null, pc=0;
  for (var yr in yc) if(yc[yr]>pc){pc=yc[yr];pk=yr;}
  return {min:mn,max:mx,peak:pk,peakCnt:pc};
}
function countForYears(years) {
  var n=0;
  for(var i=0;i<ITEMS.length;i++) if(years.indexOf(String(ITEMS[i].annee))!==-1) n++;
  return n;
}

  var sorted = [];

/* ── Filter chips ── */
function buildFilterChips() {
  var i, ymap={}, years=[];
  for (i=0; i<ITEMS.length; i++) {
    var yr=String(ITEMS[i].annee);
    if (!ymap[yr]) { ymap[yr]=true; years.push(yr); }
  }
  years.sort();
  var yc = document.getElementById('year-chips');
  for (i=0; i<years.length; i++) {
    var yb = document.createElement('button');
    yb.className='chip'; yb.setAttribute('data-y',years[i]); yb.textContent=years[i];
    (function(y,b){ b.onclick=function(){ toggleYear(y,b); }; })(years[i],yb);
    yc.appendChild(yb);
  }
  // Compter par série thématique (hors pinned)
  var scount2={};
  for (i=0; i<ITEMS.length; i++) {
    var pts=(ITEMS[i].serie||'').split('|');
    for (var j=0; j<pts.length; j++) {
      var sv2=pts[j].trim();
      if (sv2&&PINNED_TAGS.indexOf(sv2)===-1) scount2[sv2]=(scount2[sv2]||0)+1;
    }
  }
  var skeys=[];
  for (var sk2 in scount2) if(sHas(scount2,sk2)) skeys.push(sk2);
  skeys.sort(function(a,b){return scount2[b]-scount2[a];});
  // Hors séries = items sans tag thématique
  var horsN=0;
  for (i=0; i<ITEMS.length; i++) {
    var rt=(ITEMS[i].serie||'').split('|').map(function(t){return t.trim();}).filter(function(t){return t&&PINNED_TAGS.indexOf(t)===-1;});
    if(rt.length===0) horsN++;
  }
  function makeSerieChip(key, label) {
    var b=document.createElement('button');
    b.className='chip'; b.setAttribute('data-s',key); b.textContent=label;
    (function(k,btn){ btn.onclick=function(){ toggleSerie(k,btn); }; })(key,b);
    return b;
  }
  function makeVsep() { var d=document.createElement('span'); d.className='chip-vsep'; return d; }
  // ── Ligne 1 : Style/Classification ──
  var sc1=document.getElementById('serie-chips-class');
  var _b1=makeSerieChip(SANS_TAG_KEY,  '∅ Sans série');   _b1.setAttribute('data-admin','1'); sc1.appendChild(_b1);
  var _b2=makeSerieChip(NON_TAGGE_KEY, '✕ Non tagué');    _b2.setAttribute('data-admin','1'); sc1.appendChild(_b2);
  var _b3=makeSerieChip(NON_PINNED_KEY,'⊘ Sans C/NB/DP'); _b3.setAttribute('data-admin','1'); sc1.appendChild(_b3);
  var _vs1=makeVsep(); _vs1.setAttribute('data-admin','1'); sc1.appendChild(_vs1);
  for (i=0; i<PINNED_TAGS.length; i++) sc1.appendChild(makeSerieChip(PINNED_TAGS[i], PINNED_TAGS[i]));
  // ── Ligne 2 : Séries thématiques ──
  var sc2=document.getElementById('serie-chips-theme');
  sc2.appendChild(makeSerieChip(SANS_TAG_KEY, 'Hors séries · '+horsN));
  sc2.appendChild(makeVsep());
  for (i=0; i<skeys.length; i++) sc2.appendChild(makeSerieChip(skeys[i], skeys[i]+' · '+scount2[skeys[i]]));
}

function verifyItem(row, btn) {
  if (!ADMIN_NAME) return;
  // Déjà vérifié par moi → rien à faire
  var item = null;
  for (var i=0; i<ITEMS.length; i++) { if (ITEMS[i]._row===row){item=ITEMS[i];break;} }
  if (!item) return;
  var existing = (item.verifie||'').split(',').map(function(n){return n.trim().toLowerCase();});
  if (existing.indexOf(ADMIN_NAME.toLowerCase())!==-1) return;

  btn.textContent='…'; btn.disabled=true;
  var cbName='_vc'+row+'_'+Date.now();
  var script=document.createElement('script');
  window[cbName]=function(data){
    delete window[cbName];
    if(script.parentNode) script.parentNode.removeChild(script);
    if(!data.ok){btn.textContent='Erreur';btn.disabled=false;return;}
    for(var j=0;j<ITEMS.length;j++){if(ITEMS[j]._row===row){ITEMS[j].verifie=data.verifie;break;}}
    var card=btn;
    while(card&&!card.classList.contains('card')) card=card.parentElement;
    if(card){
      card.classList.add('verified');
      card.classList.add('verified-by-me');
      var vEl=card.querySelector('.card-verifiers');
      if(vEl) vEl.textContent='par '+data.verifie;
      if(hideVerified) card.style.display='none';
    }
    btn.textContent='Déjà fait ✓'; btn.disabled=true;
    var f=filterItems();
    document.getElementById('filter-count').textContent=f.length+' / '+ITEMS.length+' œuvres';
    var nVer=0; for(var vi=0;vi<ITEMS.length;vi++) if(ITEMS[vi].verifie) nVer++;
    var vc=document.getElementById('ver-count'); if(vc) vc.textContent=nVer+' / '+ITEMS.length+' vérifiés';
    updateLeaderboard();
  };
  script.onerror=function(){btn.textContent='Erreur';btn.disabled=false;};
  script.src=API_BASE+'?action=verify&token='+encodeURIComponent(ADMIN_NAME)+'&row='+row+'&callback='+cbName;
  document.head.appendChild(script);
}

function updateLeaderboard() {
  var scores={};  // clé lowercase → {display, count}
  for(var i=0;i<ITEMS.length;i++){
    var v=ITEMS[i].verifie||'';
    if(!v) continue;
    var ns=v.split(',');
    for(var j=0;j<ns.length;j++){
      var n=ns[j].trim();
      if(!n) continue;
      var key=n.toLowerCase();
      if(!scores[key]) scores[key]={display:n.charAt(0).toUpperCase()+n.slice(1).toLowerCase(),count:0};
      scores[key].count++;
    }
  }
  var sorted=[];
  for(var key2 in scores) if(Object.prototype.hasOwnProperty.call(scores,key2)) sorted.push([scores[key2].display,scores[key2].count]);
  sorted.sort(function(a,b){return b[1]-a[1];});
  var medals=['🥇','🥈','🥉'];
  var row=document.getElementById('leaderboard-row');
  if(!row) return;
  row.innerHTML='<span style="font-size:10px;color:var(--light);white-space:nowrap;text-transform:uppercase;letter-spacing:1px">Classement :</span>';
  for(var k=0;k<sorted.length;k++){
    var icon=medals[k]||'·';
    var span=document.createElement('span');
    span.className='lb-medal';
    span.innerHTML=icon+' '+esc(sorted[k][0])+' <strong>'+sorted[k][1]+'</strong>';
    row.appendChild(span);
  }
}

function filterItems() {
  var noYear=!sSize(activeYears), noSerie=!sSize(activeSeries), noSearch=!searchQuery;
  if (noYear&&noSerie&&noSearch&&!hideVerified) return ITEMS;
  var result=[], i, j, tags;
  for (i=0; i<ITEMS.length; i++) {
    var it=ITEMS[i];
    if (hideVerified && it.verifie) continue;
    var yearOk = noYear||sHas(activeYears,String(it.annee));
    tags=(it.serie||'').split('|');
    // Tags : AND — l'œuvre doit avoir TOUS les tags actifs
    var serieOk=noSerie;
    if (!serieOk) {
      if (sHas(activeSeries,NON_TAGGE_KEY)) {
        // Non tagué : aucun tag du tout
        serieOk = !(it.serie && it.serie.trim());
      } else if (sHas(activeSeries,NON_PINNED_KEY)) {
        // Sans C/NB/DP : aucun des tags pinnés dans la série
        var _pts=(it.serie||'').split('|').map(function(t){return t.trim();}).filter(function(t){return t;});
        serieOk=!PINNED_TAGS.some(function(pt){return _pts.indexOf(pt)!==-1;});
      } else if (sHas(activeSeries,SANS_TAG_KEY)) {
        // Sans série : aucun tag réel (les pinned ne comptent pas)
        var realTags=(it.serie||'').split('|').map(function(t){return t.trim();})
          .filter(function(t){return t&&PINNED_TAGS.indexOf(t)===-1;});
        serieOk = realTags.length===0;
      } else {
        serieOk=true;
        var itemTags=sFromArr(tags.map(function(t){return t.trim();}));
        for(var ak in activeSeries) if(sHas(activeSeries,ak)&&!sHas(itemTags,ak)){serieOk=false;break;}
      }
    }
    var textOk=noSearch;
    if (!textOk) {
      var h=[it.ref,it.serie,it.ico,it.crit,it.technique,it.support].join(' ').toLowerCase();
      textOk=h.indexOf(searchQuery)!==-1;
    }
    if (yearOk&&serieOk&&textOk) result.push(it);
  }
  return result;
}

function renderGallery() {
  var filtered=filterItems();
  filtered.sort(function(a,b){
    var aSD=String(a.ref).indexOf('SansDate')===0?1:0;
    var bSD=String(b.ref).indexOf('SansDate')===0?1:0;
    if(aSD!==bSD) return aSD-bSD;
    return String(a.ref)<String(b.ref)?-1:String(a.ref)>String(b.ref)?1:0;
  });
  document.getElementById('filter-count').textContent=filtered.length+' / '+ITEMS.length+' œuvres';
  var nVer=0; for(var vi=0;vi<ITEMS.length;vi++) if(ITEMS[vi].verifie) nVer++;
  var vc=document.getElementById('ver-count'); if(vc) vc.textContent=nVer+' / '+ITEMS.length+' vérifiés';
  updateLeaderboard();
  var grid=document.getElementById('grid'); grid.innerHTML='';
  for (var i=0; i<filtered.length; i++) {
    var it=filtered[i];
    var tags=(it.serie||'').split('|');
    var tagsHtml='';
    for (var j=0; j<tags.length; j++) {
      var t=tags[j].trim();
      if(t) tagsHtml+='<span class="tag" onclick="addSerieFilter(\''+esc(t)+'\')">'+esc(t)+'</span>';
    }
    var tech=[it.technique,it.support].filter(Boolean).join(' / ');
    var editUrl='https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/edit#gid='+GID+'&range=A'+it._row;
    var imgSafe=(it.image_url||'').replace(/'/g,'&#39;');
    // Bouton vérification
    var verNames=(it.verifie||'').split(',').map(function(n){return n.trim();}).filter(Boolean);
    var verByMe=ADMIN_NAME&&verNames.map(function(n){return n.toLowerCase();}).indexOf(ADMIN_NAME.toLowerCase())!==-1;
    var isVer=verNames.length>0;
    var btnLabel=verByMe?'Déjà fait ✓':(isVer?'Ajouter ma vérif':'À vérifier');
    var btnDis=verByMe?' disabled':'';
    var cardCls='card'+(isVer?' verified':'')+(verByMe?' verified-by-me':'');
    var card=document.createElement('div');
    card.className=cardCls;
    var html='<div class="card-ver-badge">✓</div>' +
      '<div class="card-img"><img src="'+(it.image_url||'')+'" alt="'+esc(it.ref)+'"' +
      ' onerror="this.style.display=\'none\'" onclick="openLB(\''+imgSafe+'\')"></div>' +
      '<a class="card-edit" href="javascript:void(0)"' +
      ' onclick="window.open(\''+editUrl+'\',\'_blank\');return false;" title="Modifier dans Sheets">✎</a>' +
      '<button class="card-tag-edit" onclick="openTagEditor('+it._row+')" title="Modifier les tags">🏷</button>' +
      '<div class="card-body"><div class="card-tags">'+tagsHtml+'</div>' +
      '<div class="card-ref">'+esc(it.ref)+'</div>';
    if(tech)    html+='<div class="card-tech">'+esc(tech)+'</div>';
    if(it.ico)  html+='<p class="card-ico">'+esc(it.ico)+'</p>';
    if(it.crit) html+='<p class="card-crit">'+esc(it.crit)+'</p>';
    html+='<button class="card-verify"'+btnDis+' onclick="verifyItem('+it._row+',this)">'+btnLabel+'</button>';
    html+='<div class="card-verifiers">'+(isVer?'par '+esc(it.verifie):'')+'</div>';
    html+='</div>';
    card.innerHTML=html; grid.appendChild(card);
  }
}

/* ── Tag Editor ── */
var tagEditorRow = null;
var tagEditorSelected = [];

function openTagEditor(row) {
  if (!adminMode) return;
  var item = null;
  for (var i=0; i<ITEMS.length; i++) { if (ITEMS[i]._row===row){item=ITEMS[i];break;} }
  if (!item) return;
  tagEditorRow = row;
  tagEditorSelected = (item.serie||'').split('|').map(function(s){return s.trim();}).filter(Boolean);

  document.getElementById('tag-drawer-ref').textContent = item.ref;
  document.getElementById('tag-drawer-img-el').src = item.image_url || '';
  document.getElementById('tag-save-status').textContent = '';
  document.getElementById('tag-save-btn').disabled = false;
  document.getElementById('tag-save-btn').textContent = 'Enregistrer';

  // Construire la liste — pinned en tête, reste alphabétique
  var allSeries = [], seen = {};
  for (var j=0; j<ITEMS.length; j++) {
    var pts = (ITEMS[j].serie||'').split('|');
    for (var k=0; k<pts.length; k++) {
      var s = pts[k].trim();
      if (s && !seen[s.toLowerCase()] && PINNED_TAGS.indexOf(s)===-1) {
        seen[s.toLowerCase()]=true; allSeries.push(s);
      }
    }
  }
  allSeries.sort();

  var list = document.getElementById('tag-list'); list.innerHTML='';
  document.getElementById('tag-required-err').style.display='none';

  function makeTagRow(tag, pinned) {
    var isChk = tagEditorSelected.indexOf(tag) !== -1;
    var lbl = document.createElement('label');
    lbl.className = 'tag-check-row'+(isChk?' checked':'')+(pinned?' tag-pinned':'');
    var cb = document.createElement('input');
    cb.type='checkbox'; cb.checked=isChk; cb.setAttribute('data-tag',tag);
    (function(t,label,checkbox){
      checkbox.onchange=function(){
        if(this.checked){
          if(tagEditorSelected.length>=5){this.checked=false;return;}
          tagEditorSelected.push(t);
          label.className='tag-check-row'+(pinned?' tag-pinned':'')+' checked';
        } else {
          tagEditorSelected=tagEditorSelected.filter(function(x){return x!==t;});
          label.className='tag-check-row'+(pinned?' tag-pinned':'');
        }
        document.getElementById('tag-count').textContent=tagEditorSelected.length+' / 5';
        document.getElementById('tag-required-err').style.display='none';
      };
    })(tag,lbl,cb);
    lbl.appendChild(cb); lbl.appendChild(document.createTextNode(' '+tag));
    return lbl;
  }

  for (var p=0; p<PINNED_TAGS.length; p++) list.appendChild(makeTagRow(PINNED_TAGS[p], true));
  var sep=document.createElement('div'); sep.className='tag-separator'; list.appendChild(sep);
  for (var m=0; m<allSeries.length; m++) list.appendChild(makeTagRow(allSeries[m], false));

  document.getElementById('tag-count').textContent = tagEditorSelected.length+' / 5';
  document.getElementById('tag-panel').className = 'open';
}

  var img = document.getElementById('tag-drawer-img-el');

function closeTagEditor() {
  document.getElementById('tag-panel').className = '';
  tagEditorRow = null; tagEditorSelected = [];
}

function saveTagEditor() {
  if (!tagEditorRow || !ADMIN_NAME) return;
  // Validation : Couleur ou Noir et Blanc obligatoire
  var hasPinned = tagEditorSelected.some(function(t){return PINNED_TAGS.indexOf(t)!==-1;});
  if (!hasPinned) {
    document.getElementById('tag-required-err').style.display='block';
    return;
  }
  var btn = document.getElementById('tag-save-btn');
  btn.textContent='…'; btn.disabled=true;
  var tagsParam = encodeURIComponent(tagEditorSelected.join('|'));
  var cbName = '_ut'+tagEditorRow+'_'+Date.now();
  var script = document.createElement('script');
  window[cbName] = function(data) {
    delete window[cbName];
    if (script.parentNode) script.parentNode.removeChild(script);
    if (!data.ok) {
      btn.textContent='Erreur'; btn.disabled=false;
      document.getElementById('tag-save-status').textContent='Erreur: '+(data.error||'');
      return;
    }
    for (var i=0; i<ITEMS.length; i++) {
      if (ITEMS[i]._row===tagEditorRow) {
        ITEMS[i].serie=data.serie;
        if (data.verifie) ITEMS[i].verifie=data.verifie;
        break;
      }
    }
    closeTagEditor();
    renderGallery();
    updateLeaderboard();
  };
  script.onerror = function(){btn.textContent='Erreur';btn.disabled=false;};
  script.src = API_BASE+'?action=updateTags&token='+encodeURIComponent(ADMIN_NAME)+'&row='+tagEditorRow+'&tags='+tagsParam+'&callback='+cbName;
  document.head.appendChild(script);
}

function addNewTag() {
  var inp  = document.getElementById('tag-new-input');
  var errEl= document.getElementById('tag-new-err');
  var tag  = inp.value.trim();
  errEl.style.display='none';
  if (!tag) return;
  // Vérifier doublon (insensible à la casse)
  var list = document.getElementById('tag-list');
  var existing = list.querySelectorAll('input[type=checkbox]');
  for (var i=0; i<existing.length; i++) {
    if (existing[i].getAttribute('data-tag').toLowerCase()===tag.toLowerCase()) {
      errEl.textContent='Ce tag existe déjà.'; errEl.style.display='block';
      inp.select(); return;
    }
  }
  if (tagEditorSelected.length < 4) tagEditorSelected.push(tag);
  // Ajouter la ligne dans l'UI
  var lbl=document.createElement('label');
  lbl.className='tag-check-row checked';
  var cb=document.createElement('input');
  cb.type='checkbox'; cb.checked=true; cb.setAttribute('data-tag',tag);
  (function(t,label,checkbox){
    checkbox.onchange=function(){
      if(this.checked){
        if(tagEditorSelected.length>=4){this.checked=false;return;}
        tagEditorSelected.push(t); label.className='tag-check-row checked';
      } else {
        tagEditorSelected=tagEditorSelected.filter(function(x){return x!==t;});
        label.className='tag-check-row';
      }
      document.getElementById('tag-count').textContent=tagEditorSelected.length+' / 5';
    };
  })(tag,lbl,cb);
  lbl.appendChild(cb); lbl.appendChild(document.createTextNode(' '+tag));
  // Insérer en ordre alphabétique dans la liste
  var inserted=false;
  for(var j=0;j<existing.length;j++){
    if(existing[j].getAttribute('data-tag').localeCompare(tag)>0){
      list.insertBefore(lbl,existing[j].parentElement);
      inserted=true; break;
    }
  }
  if(!inserted) list.appendChild(lbl);
  document.getElementById('tag-count').textContent=tagEditorSelected.length+' / 5';
  inp.value='';
  // Écrire dans le Sheet Référentiel (JSONP, immédiat)
  var cbName='_at'+Date.now();
  var script=document.createElement('script');
  window[cbName]=function(data){
    delete window[cbName];
    if(script.parentNode) script.parentNode.removeChild(script);
    if(data.error){ errEl.textContent='Erreur Sheet: '+data.error; errEl.style.display='block'; }
  };
  script.src=API_BASE+'?action=addTag&token='+encodeURIComponent(ADMIN_NAME)+'&tag='+encodeURIComponent(tag)+'&callback='+cbName;
  document.head.appendChild(script);
}

/* ── Admin ── */
function toggleAdmin() {
  if (adminMode) {
    adminMode=false; ADMIN_NAME='';
    document.body.classList.remove('admin-on');
    var lb=document.getElementById('lock-btn');
    lb.classList.remove('unlocked'); lb.title='Administration';
    renderGallery();
  } else {
    document.getElementById('admin-pwd').value='';
    document.getElementById('admin-err').textContent='';
    document.getElementById('admin-modal').style.display='flex';
    setTimeout(function(){document.getElementById('admin-pwd').focus();},50);
  }
}
function closeAdminModal(){ document.getElementById('admin-modal').style.display='none'; }
function checkAdmin() {
  var input=document.getElementById('admin-pwd').value.trim().toLowerCase();
  if(VALID_NAMES.indexOf(input)!==-1){
    ADMIN_NAME=input.charAt(0).toUpperCase()+input.slice(1);
    adminMode=true;
    document.body.classList.add('admin-on');
    var lb=document.getElementById('lock-btn');
    lb.classList.add('unlocked'); lb.title=ADMIN_NAME+' connecté·e';
    closeAdminModal();
    renderGallery();
  } else {
    document.getElementById('admin-err').textContent='Prénom non reconnu';
    document.getElementById('admin-pwd').value='';
    document.getElementById('admin-pwd').focus();
  }
}
</script>
