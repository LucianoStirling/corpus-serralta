<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Corpus Serralta</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<style>
:root{
  --ink:#1a1a1a;--mid:#555;--light:#999;--rule:#e8e8e6;
  --bg:#f7f7f5;--white:#fffef8;--accent:#c8a96e;--nav-h:48px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--ink)}

/* ── NAV ── */
#main-nav{display:flex;border-bottom:2px solid var(--rule);background:var(--white);
  position:sticky;top:0;z-index:20;height:var(--nav-h);align-items:center}
.main-tab{padding:0 28px;height:100%;font-size:13px;cursor:pointer;color:var(--light);
  border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-2px;
  transition:all .15s;font-family:inherit}
.main-tab.active{color:var(--ink);border-color:var(--ink);font-weight:500}

/* ── FILTRES ── */
.filters{padding:8px 24px;background:var(--white);border-bottom:1px solid var(--rule);
  display:flex;flex-direction:column;gap:5px;position:sticky;top:var(--nav-h);z-index:18}
.filter-row{display:flex;align-items:center;gap:8px;min-width:0}
.filter-chips-scroll{display:flex;gap:6px;overflow-x:auto;flex-wrap:nowrap;
  scrollbar-width:none;-ms-overflow-style:none;padding-bottom:1px;min-width:0}
.filter-chips-scroll::-webkit-scrollbar{display:none}
.filter-label{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--light);
  white-space:nowrap;flex-shrink:0;width:46px}
.chip{font-size:11px;padding:4px 12px;border:1px solid var(--rule);border-radius:20px;
  cursor:pointer;background:var(--white);color:var(--mid);transition:all .15s;white-space:nowrap;
  flex-shrink:0;-webkit-tap-highlight-color:transparent}
.chip:hover{border-color:var(--mid)}
.chip.active{background:var(--ink);color:var(--white);border-color:var(--ink)}
.filter-search-row{display:flex;align-items:center;gap:10px;padding:2px 0 4px}
.filter-search{flex:1;border:1px solid var(--rule);border-radius:20px;
  padding:5px 14px;font-size:12px;font-family:inherit;color:var(--ink);
  background:var(--white);outline:none;transition:border-color .15s;min-width:0}
.filter-search:focus{border-color:var(--mid)}
.filter-search::placeholder{color:var(--light)}
#filter-count{font-size:11px;color:var(--light);white-space:nowrap}
.clear-btn{font-size:11px;color:var(--accent);cursor:pointer;text-decoration:underline;white-space:nowrap}

/* ── GALERIE ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:2px;padding:2px}
.card{background:var(--white);display:flex;flex-direction:column;position:relative}
.card-img{overflow:hidden;background:#f0f0ee;cursor:zoom-in;aspect-ratio:3/2}
.card-img img{width:100%;height:100%;display:block;transition:opacity .2s;object-fit:cover}
.card-img img:hover{opacity:.9}
.card-body{padding:8px 10px;flex:1;display:flex;flex-direction:column;gap:4px}
.card-tags{display:flex;flex-wrap:wrap;gap:4px}
.tag{font-size:10px;padding:2px 8px;border-radius:12px;background:#f0f0ec;color:var(--mid);
  cursor:pointer;transition:background .1s}
.tag:hover{background:#e0e0db}
.card-ref{font-size:11px;font-weight:600}
.card-tech{font-size:11px;color:var(--light)}

/* ── COLLECTIONS ── */
.coll-view{padding:32px 24px}
.coll-section{margin-bottom:48px}
.coll-title{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--light);margin-bottom:20px}
.coll-divider{border:none;border-top:1px solid var(--rule);margin-bottom:32px}
.series-major-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--rule)}
.smc{background:var(--white);padding:22px 20px;cursor:pointer;transition:background .12s}
.smc:hover{background:var(--bg)}
.smc-title{font-size:14px;font-weight:500;margin-bottom:4px}
.smc-range{font-size:10px;color:var(--light);margin:2px 0 6px;letter-spacing:.2px}
.smc-n{font-size:38px;font-weight:300;color:var(--accent);line-height:1.1;
  margin-bottom:8px;font-variant-numeric:tabular-nums}
.smc-desc{font-size:12px;color:var(--mid);line-height:1.65}
.series-all-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.entry-card{background:var(--white);border:1px solid var(--rule);border-radius:3px;
  padding:20px;cursor:pointer;transition:all .15s;text-align:center}
.entry-card:hover{border-color:var(--ink);transform:translateY(-2px)}
.entry-card-title{font-size:16px;font-weight:300;margin-bottom:4px}
.entry-card-count{font-size:12px;color:var(--light)}
.entry-card-event{font-size:11px;color:var(--accent);margin-top:6px;font-style:italic}
.entry-card-desc{font-size:11px;color:var(--light);line-height:1.5;margin-top:8px;text-align:left}
.ec-range{font-size:10px;color:var(--light);margin:1px 0 4px}

/* ── LIGHTBOX ── */
#lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:100;
  align-items:center;justify-content:center}
#lb.open{display:flex}
#lb img{max-width:90vw;max-height:90vh;object-fit:contain}
#lb-close{position:fixed;top:18px;right:22px;color:#888;font-size:26px;
  cursor:pointer;background:none;border:none}

/* ── LOADING ── */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:16px;z-index:200}
.spinner{width:32px;height:32px;border:2px solid var(--rule);
  border-top-color:var(--ink);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{font-size:13px;color:var(--light)}
#loading small{font-size:10px;color:#bbb}
.err-msg{color:#c00;font-size:13px;max-width:400px;text-align:center;line-height:1.6}

/* ── ADMIN ── */
.lock-btn{background:none;border:none;cursor:pointer;font-size:16px;
  padding:0 16px 0 8px;opacity:.3;transition:opacity .15s;margin-left:auto}
.lock-btn:hover,.lock-btn.unlocked{opacity:1}
.lock-btn.unlocked{filter:sepia(1) saturate(3) hue-rotate(90deg)}
.admin-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;
  display:flex;align-items:center;justify-content:center}
.admin-box{background:var(--white);border:1px solid var(--rule);border-radius:4px;
  padding:28px 32px;width:280px;box-shadow:0 8px 32px rgba(0,0,0,.18)}
.admin-title{font-size:14px;font-weight:400;margin-bottom:16px}
.admin-input{width:100%;border:1px solid var(--rule);border-radius:3px;
  padding:8px 12px;font-size:13px;font-family:inherit;outline:none}
.admin-input:focus{border-color:var(--ink)}
.admin-err{font-size:12px;color:#c00;min-height:18px;margin-top:6px}
.admin-btns{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}
.admin-cancel,.admin-ok{border:1px solid var(--rule);background:none;
  padding:6px 16px;font-size:12px;border-radius:2px;cursor:pointer;font-family:inherit}
.admin-ok{background:var(--ink);color:var(--white);border-color:var(--ink)}

/* ── TAG EDITOR ── */
#tag-panel{display:none;position:fixed;inset:0;z-index:300}
#tag-panel.open{display:flex}
#tag-overlay{flex:1;background:rgba(0,0,0,.35);cursor:pointer}
#tag-drawer{width:300px;background:var(--white);display:flex;flex-direction:column;
  border-left:1px solid var(--rule);overflow:hidden;height:100%}
#tag-drawer-header{padding:14px 16px;border-bottom:1px solid var(--rule);
  display:flex;justify-content:space-between;align-items:center;gap:8px;flex-shrink:0}
#tag-drawer-ref{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tag-close-btn{background:none;border:none;cursor:pointer;font-size:18px;
  color:var(--mid);padding:0;flex-shrink:0;line-height:1}
#tag-drawer-img{height:110px;overflow:hidden;background:#f0f0ee;flex-shrink:0;cursor:zoom-in}
#tag-drawer-img img{width:100%;height:100%;object-fit:contain}
#tag-drawer-info{padding:6px 16px;font-size:11px;color:var(--light);
  border-bottom:1px solid var(--rule);display:flex;justify-content:space-between;
  align-items:center;flex-shrink:0}
#tag-count{font-weight:600;color:var(--ink)}
#tag-list{flex:1;overflow-y:auto;padding:4px 0}
.tag-check-row{display:flex;align-items:center;gap:10px;padding:7px 16px;
  cursor:pointer;font-size:12px;color:var(--ink);transition:background .1s;user-select:none}
.tag-check-row:hover{background:var(--bg)}
.tag-check-row.checked{color:#2a7a3b;font-weight:500}
.tag-check-row input{accent-color:#2a7a3b;flex-shrink:0;width:14px;height:14px;cursor:pointer}
.tag-pinned{background:#fafaf8}
.tag-separator{height:1px;background:var(--rule);margin:4px 0}
.tag-required-err{font-size:11px;color:#c00;padding:4px 16px;display:none}
#tag-drawer-footer{padding:12px 16px;border-top:1px solid var(--rule);
  display:flex;gap:8px;justify-content:flex-end;flex-shrink:0}
#tag-save-btn{background:var(--ink);color:var(--white);border:none;
  padding:7px 20px;border-radius:3px;cursor:pointer;font-size:13px}
#tag-save-btn:disabled{opacity:.5;cursor:default}
.tag-cancel-btn{background:none;border:1px solid var(--rule);color:var(--mid);
  padding:7px 16px;border-radius:3px;cursor:pointer;font-size:13px}
.card-tag-edit{display:none;position:absolute;top:36px;right:8px;width:26px;height:26px;
  border-radius:50%;background:rgba(255,255,255,.9);border:1px solid var(--rule);
  cursor:pointer;align-items:center;justify-content:center;font-size:13px;z-index:2;line-height:1}
body.admin-on .card-tag-edit{display:flex}
.card-tag-edit:hover{background:var(--ink);color:var(--white);border-color:var(--ink)}
#tag-new-row{display:flex;gap:6px;padding:8px 16px;border-top:1px solid var(--rule);flex-shrink:0}
#tag-new-input{flex:1;border:1px solid var(--rule);border-radius:3px;
  padding:5px 8px;font-size:12px;font-family:inherit;outline:none}
#tag-new-input:focus{border-color:var(--ink)}
#tag-new-btn{background:var(--ink);color:var(--white);border:none;border-radius:3px;
  padding:5px 10px;cursor:pointer;font-size:13px;flex-shrink:0}
#tag-new-err{font-size:11px;color:#c00;padding:0 16px;display:none}
#tag-save-status{font-size:10px;color:#2a7a3b}

/* ── RESPONSIVE ── */
@media(max-width:800px){
  .filters{padding:6px 16px}
  .series-major-grid{grid-template-columns:repeat(2,1fr)}
  .series-all-grid{grid-template-columns:repeat(2,1fr)}
  .coll-view{padding:24px 16px}
}
@media(max-width:480px){
  .grid{grid-template-columns:1fr}
  .series-major-grid{grid-template-columns:1fr}
  .series-all-grid{grid-template-columns:1fr}
  .chip{font-size:12px;padding:5px 10px}
}
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p id="load-msg"></p>
  <small id="load-sub"></small>
</div>

<nav id="main-nav" style="display:none">
  <button class="main-tab active" id="tab-galerie" onclick="switchMainTab('galerie')"></button>
  <button class="main-tab" id="tab-collections" onclick="switchMainTab('collections')"></button>
  <button class="lock-btn" id="lock-btn" onclick="toggleAdmin()" title="Administration">&#128274;</button>
</nav>

<div id="galerie-tab">
  <div class="filters">
    <div class="filter-row">
      <span class="filter-label" id="lbl-annees"></span>
      <div class="filter-chips-scroll" id="year-chips"></div>
    </div>
    <div class="filter-row">
      <span class="filter-label" style="font-size:9px" id="lbl-style"></span>
      <div class="filter-chips-scroll" id="serie-chips-class"></div>
    </div>
    <div class="filter-row">
      <span class="filter-label" id="lbl-series"></span>
      <div class="filter-chips-scroll" id="serie-chips-theme"></div>
    </div>
    <div class="filter-search-row">
      <input type="search" class="filter-search" id="search-input" oninput="onSearch(this.value)">
      <span id="filter-count"></span>
      <span class="clear-btn" onclick="clearFilters()" style="display:none" id="clear-btn"></span>
    </div>
  </div>
  <div class="grid" id="grid"></div>
</div>

<div id="collections-tab" style="display:none">
  <div class="coll-view" id="coll-view"></div>
</div>

<div id="lb">
  <img id="lb-img" src="" alt="">
  <button id="lb-close" onclick="closeLB()">&#x2715;</button>
</div>

<div id="tag-panel">
  <div id="tag-overlay" onclick="closeTagEditor()"></div>
  <div id="tag-drawer">
    <div id="tag-drawer-header">
      <span id="tag-drawer-ref"></span>
      <button class="tag-close-btn" onclick="closeTagEditor()">&#x2715;</button>
    </div>
    <div id="tag-drawer-img" onclick="openLBFromTag()">
      <img id="tag-drawer-img-el" src="" alt="">
    </div>
    <div id="tag-drawer-info">
      <span id="tag-count">0 / 5 tags</span>
      <span id="tag-save-status"></span>
    </div>
    <div id="tag-list"></div>
    <div id="tag-required-err" class="tag-required-err">⚠ Au moins un tag technique obligatoire (Couleur, Noir et Blanc, Diapo-Photo, Martelés, Sculptures, Supports Divers)</div>
    <div id="tag-new-err"></div>
    <div id="tag-new-row">
      <input id="tag-new-input" type="text" placeholder="Nouveau tag&#8230;"
        onkeydown="if(event.key==='Enter')addNewTag()">
      <button id="tag-new-btn" onclick="addNewTag()">+</button>
    </div>
    <div id="tag-drawer-footer">
      <button class="tag-cancel-btn" onclick="closeTagEditor()">Annuler</button>
      <button id="tag-save-btn" onclick="saveTagEditor()">Enregistrer</button>
    </div>
  </div>
</div>

<div id="admin-modal" class="admin-overlay" style="display:none">
  <div class="admin-box">
    <div class="admin-title">Qui es-tu ?</div>
    <input type="text" id="admin-pwd" class="admin-input" placeholder="Ton prénom"
      autocomplete="off" onkeydown="if(event.key==='Enter')checkAdmin()">
    <div id="admin-err" class="admin-err"></div>
    <div class="admin-btns">
      <button class="admin-cancel" onclick="closeAdminModal()">Annuler</button>
      <button class="admin-ok" onclick="checkAdmin()">Valider</button>
    </div>
  </div>
</div>

      'Animaux':               'Caballos, toros, pájaros, perros… A menudo en tensión o fusión con el desnudo humano.',
      'Visages':               'Rostros cuyos detalles están trabajados con precisión, en oposición a los pequeños círculos que anonimizan las figuras en las composiciones densas.',
      'SCIENS-ART':            'Expresión pictórica del sistema cosmológico de Serralta. Círculos, cuadrículas, diagramas, una cartografía de fuerzas invisibles surgida de su libro fundacional, concebida como lenguaje universal.',

      'Paquebot':              'Barcos dibujados con una precisión casi técnica, inscritos en paisajes ya habitados. Figura del exilio y del desplazamiento, motivo autobiográfico discreto.',
      'Portraits':             'Rostros muy elaborados que representan a allegados o personas conocidas, miradas frontales de una intensidad inusual.',
      'Manuscrit':             'Obras que integran texto manuscrito: poemas, fragmentos teóricos, dedicatorias desarrolladas. La escritura como elemento plástico de pleno derecho.',
      'Supports Divers':       'Todo lo que no es el papel Canson habitual: cartón, poliestireno, sobres, materiales recuperados. El soporte nunca es anodino: altera el trazo, constriñe el gesto, transforma la superficie en coautor de la imagen.',
      'Martelés':         'Técnica propia de Serralta: la reproducción fotográfica de un dibujo se pega sobre una placa de espuma expandida y luego se martillea a mano para crear un relieve en hueco. A menudo se añade tinta en las zonas martilladas, revelando la huella del gesto. A medio camino entre dibujo, estampa y escultura.',
      'Diapo-Photo':           'Obras que incluyen fotografías, así como el trabajo sobre diapositivas.',
      'Diapogravure':          'Técnica única: trabajo directo sobre diapositivas de 35 mm.',
      'Personnages Filiformes':'Serralta borra la masa de los cuerpos y reduce la figura a un trazado mínimo, lineal. Este despojamiento contrasta con el carácter exuberante y carnal de la mayor parte de su obra.',
      'Politique':             'Los militares, las banderas, las armas, las escenas de tortura. Huella del exilio y de la dictadura uruguaya, una presencia rara pero explícita en un corpus más bien cosmológico.',
      'Habillés':         'Contrapunto a los desnudos omnipresentes: en Serralta, la desnudez es el estado natural. Un personaje vestido se convierte a menudo en portador de una simbología (militares, figuras de autoridad…).',
      'Urbanisme':             'Paisajes reconocibles, bocetos arquitectónicos, vistas urbanas. Los escasos momentos en que Serralta ancla la composición en un espacio geográfico identificable.',
      'Mise en abyme':         'La mano, el dedo o el bolígrafo del artista aparece en el dibujo mientras dibuja. Gesto reflexivo clásico, raro en Serralta pero siempre deliberado.',
      'Sport':                 'Fútbol, hipódromos, competiciones. Homenaje a la cultura popular rioplatense, tema festivo.',
      'Nus':                   'El motivo más constante, presente desde 1976 y nunca abandonado. Cuerpo múltiple, frontal, integrado en la naturaleza o confrontado al animal. El desnudo es para Serralta una sintaxis tanto como un tema.',
      'Études':           'Investigaciones formales preparatorias o autónomas: esbozos de figuras, estudios de manos y rostros. El laboratorio visible de la práctica de Serralta.',
      'Dédicaces':        'Obras ofrecidas y dedicadas. Revelan la red amistosa e intelectual de Serralta: músicos, arquitectos, poetas, familia.',

      'Sculptures':            'Producción tridimensional marginal pero documentada. Materiales heterogéneos, formas surgidas del vocabulario figurativo habitual.',
      'Croquis de voyage':     'Viaje de estudios por Europa de un joven arquitecto uruguayo de 28 años. Entre 1947 y 1960, Serralta (nacido en 1919) recorre Francia, Italia y España, cuaderno en mano: catedrales góticas, plazas italianas, puentes parisinos, planos acotados. Estos 209 dibujos a tinta o lápiz, anteriores al resto del corpus, son el único testimonio visual de su formación europea — antes del exilio, antes de la dictadura, antes del SCIENS-ART.'

/* ── Startup ── */
document.addEventListener('DOMContentLoaded', startApp);

function startApp() {
  document.documentElement.lang = lang;
  var msg = document.getElementById('load-msg');
  var sub = document.getElementById('load-sub');
  if (msg) msg.textContent = T('loading');
  if (sub) sub.textContent = T('connecting');
  fetch(API_URL)
    .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(function(resp) {
      if (msg) msg.textContent = Tn('loading_n', resp.items.length);
      ITEMS = resp.items.map(function(a) {
        return { ref:a[0], annee:a[1], technique:a[2], support:a[3],
                 serie:a[4], ico:a[5], crit:a[6], image_url:a[7], _row:a[8] };
      });
      SHEET_ID = resp.sheetId; GID = resp.gid; APP_VERSION = resp.version || '';
      init();
    })
    .catch(function(err) {
      if (msg) { msg.className = 'err-msg'; msg.textContent = T('error'); }
      if (sub) sub.textContent = err.message;
    });
}

function init() {
  document.getElementById('loading').style.display = 'none';

}

/* ── Helpers comptage ── */
function seriesYearRange(name) {
  var yrs = [], yc = {};
  for (var i = 0; i < ITEMS.length; i++) {
    var tags = (ITEMS[i].serie || '').split('|').map(function(t) { return t.trim(); });
    if (tags.indexOf(name) === -1) continue;
    var y = parseInt(String(ITEMS[i].annee));
    if (!isNaN(y)) { yrs.push(y); yc[y] = (yc[y] || 0) + 1; }
  }
  if (!yrs.length) return null;
  return { min: Math.min.apply(null, yrs), max: Math.max.apply(null, yrs) };
}
function countForYears(years) {
  var n = 0;
  for (var i = 0; i < ITEMS.length; i++)
    if (years.indexOf(String(ITEMS[i].annee)) !== -1) n++;
  return n;
}

    for (var j = 0; j < pts.length; j++) {
      var sp = pts[j].trim();
      if (sp) scountAll[sp] = (scountAll[sp] || 0) + 1;
    }
  }
  var sortedAll = [];
  for (var k in scountAll)
    if (sHas(scountAll, k) && HIDDEN.indexOf(k) === -1) sortedAll.push([k, scountAll[k]]);
  sortedAll.sort(function(a, b) { return b[1] - a[1]; });
  var top5 = sortedAll.slice(0, 5);

/* ── Chips filtres ── */
function buildFilterChips() {
  var i, ymap = {}, years = [];
  for (i = 0; i < ITEMS.length; i++) {
    var yr = String(ITEMS[i].annee);
    if (!ymap[yr]) { ymap[yr] = true; years.push(yr); }
  }
  years.sort();
  var yc = document.getElementById('year-chips');
  for (i = 0; i < years.length; i++) {
    var yb = document.createElement('button');
    yb.className = 'chip'; yb.setAttribute('data-y', years[i]); yb.textContent = years[i];
    (function(y, b) { b.onclick = function() { toggleYear(y, b); }; })(years[i], yb);
    yc.appendChild(yb);
  }
  var scount2 = {};
  for (i = 0; i < ITEMS.length; i++) {
    var pts = (ITEMS[i].serie || '').split('|');
    for (var j = 0; j < pts.length; j++) {
      var sv = pts[j].trim();
      if (sv && PINNED_TAGS.indexOf(sv) === -1) scount2[sv] = (scount2[sv] || 0) + 1;
    }
  }
  var skeys = [];
  for (var sk in scount2) if (sHas(scount2, sk)) skeys.push(sk);
  skeys.sort(function(a, b) { return scount2[b] - scount2[a]; });

  function makeChip(key) {
    var b = document.createElement('button');
    b.className = 'chip'; b.setAttribute('data-s', key); b.textContent = tagLabel(key);
    (function(k, btn) { btn.onclick = function() { toggleSerie(k, btn); }; })(key, b);
    return b;
  }
  var sc1 = document.getElementById('serie-chips-class');
  for (i = 0; i < PINNED_TAGS.length; i++) sc1.appendChild(makeChip(PINNED_TAGS[i]));
  var sc2 = document.getElementById('serie-chips-theme');
  for (i = 0; i < skeys.length; i++) sc2.appendChild(makeChip(skeys[i]));
}

function toggleYear(y, btn) {
  if (sHas(activeYears, y)) { sDel(activeYears, y); btn.className = 'chip'; }
  else { sAdd(activeYears, y); btn.className = 'chip active'; }
  enforceMinFilter(); renderGallery();
}
function toggleSerie(s, btn) {
  if (sHas(activeSeries, s)) { sDel(activeSeries, s); btn.className = 'chip'; }
  else { sAdd(activeSeries, s); btn.className = 'chip active'; }
  enforceMinFilter(); renderGallery();
}
function enforceMinFilter() {
  var active = sSize(activeYears) > 0 || sSize(activeSeries) > 0 || searchQuery.length > 0;
  document.getElementById('clear-btn').style.display = active ? 'inline' : 'none';
}
function onSearch(val) { searchQuery = val.trim().toLowerCase(); enforceMinFilter(); renderGallery(); }
function clearFilters() {
  sClear(activeYears); sClear(activeSeries); searchQuery = '';
  var si = document.getElementById('search-input'); if (si) si.value = '';
  document.querySelectorAll('.chip').forEach(function(c) { c.className = 'chip'; });
  enforceMinFilter(); renderGallery();
}

/* ── Filtrage + rendu ── */
function filterItems() {
  var noYear = !sSize(activeYears), noSerie = !sSize(activeSeries), noSearch = !searchQuery;
  if (noYear && noSerie && noSearch) return ITEMS;
  var result = [], i;
  for (i = 0; i < ITEMS.length; i++) {
    var it = ITEMS[i];
    var yearOk = noYear || sHas(activeYears, String(it.annee));
    var serieOk = noSerie;
    if (!serieOk) {
      serieOk = true;
      var itemTags = sFromArr((it.serie || '').split('|').map(function(t) { return t.trim(); }));
      for (var ak in activeSeries)
        if (sHas(activeSeries, ak) && !sHas(itemTags, ak)) { serieOk = false; break; }
    }
    var textOk = noSearch;
    if (!textOk) {
      var h = [it.ref, it.serie, it.technique, it.support].join(' ').toLowerCase();
      textOk = h.indexOf(searchQuery) !== -1;
    }
    if (yearOk && serieOk && textOk) result.push(it);
  }
  return result;
}

function renderGallery() {
  var filtered = filterItems();
  filtered.sort(function(a, b) {
    var aSD = String(a.ref).indexOf('SansDate') === 0 ? 1 : 0;
    var bSD = String(b.ref).indexOf('SansDate') === 0 ? 1 : 0;
    if (aSD !== bSD) return aSD - bSD;
    return String(a.ref) < String(b.ref) ? -1 : String(a.ref) > String(b.ref) ? 1 : 0;
  });
  var fc = document.getElementById('filter-count');
  if (fc) fc.textContent = filtered.length + ' / ' + ITEMS.length + ' ' + T('works');
  var grid = document.getElementById('grid'); grid.innerHTML = '';
  for (var i = 0; i < filtered.length; i++) {
    var it = filtered[i];
    var tags = (it.serie || '').split('|');
    var tagsHtml = '';
    for (var j = 0; j < tags.length; j++) {
      var t = tags[j].trim();
      if (t) tagsHtml += '<span class="tag" onclick="addSerieFilter(\'' + esc(t) + '\')">' + esc(tagLabel(t)) + '</span>';
    }
    var tech = [it.technique ? techLabel(it.technique) : '', it.support ? supLabel(it.support) : ''].filter(Boolean).join(' / ');
    var imgSafe = (it.image_url || '').replace(/'/g, '&#39;');
    var card = document.createElement('div'); card.className = 'card';
    card.innerHTML =
      '<div class="card-img"><img src="' + (it.image_url || '') + '" alt="' + esc(it.ref) + '"' +
      ' onerror="this.style.display=\'none\'" onclick="openLB(\'' + imgSafe + '\')"></div>' +
      '<button class="card-tag-edit" onclick="openTagEditor(' + it._row + ')" title="Modifier les tags">🏷</button>' +
      '<div class="card-body"><div class="card-tags">' + tagsHtml + '</div>' +
      '<div class="card-ref">' + esc(it.ref) + '</div>' +
      (tech ? '<div class="card-tech">' + esc(tech) + '</div>' : '') +
      '</div>';
    grid.appendChild(card);
  }
}

function addSerieFilter(s) {
  sAdd(activeSeries, s);
  document.querySelectorAll('#serie-chips-class .chip, #serie-chips-theme .chip').forEach(function(c) {
    if (c.getAttribute('data-s') === s) c.className = 'chip active';
  });
  enforceMinFilter(); renderGallery();
}

/* ── Tag editor ── */
var tagEditorRow = null;
var tagEditorSelected = [];

function openTagEditor(row) {
  if (!adminMode) return;
  var item = null;
  for (var i = 0; i < ITEMS.length; i++) { if (ITEMS[i]._row === row) { item = ITEMS[i]; break; } }
  if (!item) return;
  tagEditorRow = row;
  tagEditorSelected = (item.serie || '').split('|').map(function(s){ return s.trim(); }).filter(Boolean);
  document.getElementById('tag-drawer-ref').textContent = item.ref;
  document.getElementById('tag-drawer-img-el').src = item.image_url || '';
  document.getElementById('tag-save-status').textContent = '';
  document.getElementById('tag-save-btn').disabled = false;
  document.getElementById('tag-save-btn').textContent = 'Enregistrer';

  var allSeries = [], seen = {};
  for (var j = 0; j < ITEMS.length; j++) {
    var pts = (ITEMS[j].serie || '').split('|');
    for (var k = 0; k < pts.length; k++) {
      var s = pts[k].trim();
      if (s && !seen[s.toLowerCase()] && PINNED_TAGS.indexOf(s) === -1) {
        seen[s.toLowerCase()] = true; allSeries.push(s);
      }
    }
  }
  allSeries.sort();

  var list = document.getElementById('tag-list'); list.innerHTML = '';
  document.getElementById('tag-required-err').style.display = 'none';
  document.getElementById('tag-new-err').style.display = 'none';

  function makeTagRow(tag, pinned) {
    var isChk = tagEditorSelected.indexOf(tag) !== -1;
    var lbl = document.createElement('label');
    lbl.className = 'tag-check-row' + (isChk ? ' checked' : '') + (pinned ? ' tag-pinned' : '');
    var cb = document.createElement('input');
    cb.type = 'checkbox'; cb.checked = isChk; cb.setAttribute('data-tag', tag);
    (function(t, label, checkbox) {
      checkbox.onchange = function() {
        if (this.checked) {
          if (tagEditorSelected.length >= 5) { this.checked = false; return; }
          tagEditorSelected.push(t);
          label.className = 'tag-check-row' + (pinned ? ' tag-pinned' : '') + ' checked';
        } else {
          tagEditorSelected = tagEditorSelected.filter(function(x) { return x !== t; });
          label.className = 'tag-check-row' + (pinned ? ' tag-pinned' : '');
        }
        document.getElementById('tag-count').textContent = tagEditorSelected.length + ' / 5';
        document.getElementById('tag-required-err').style.display = 'none';
      };
    })(tag, lbl, cb);
    lbl.appendChild(cb); lbl.appendChild(document.createTextNode(' ' + tag));
    return lbl;
  }

  for (var p = 0; p < PINNED_TAGS.length; p++) list.appendChild(makeTagRow(PINNED_TAGS[p], true));
  var sep = document.createElement('div'); sep.className = 'tag-separator'; list.appendChild(sep);
  for (var m = 0; m < allSeries.length; m++) list.appendChild(makeTagRow(allSeries[m], false));

  document.getElementById('tag-count').textContent = tagEditorSelected.length + ' / 5';
  document.getElementById('tag-panel').className = 'open';
}

function openLBFromTag() {
  var img = document.getElementById('tag-drawer-img-el');
  if (img && img.src) openLB(img.src);
}

function closeTagEditor() {
  document.getElementById('tag-panel').className = '';
  tagEditorRow = null; tagEditorSelected = [];
}

function saveTagEditor() {
  if (!tagEditorRow || !ADMIN_NAME) return;
  var hasPinned = tagEditorSelected.some(function(t) { return PINNED_TAGS.indexOf(t) !== -1; });
  if (!hasPinned) {
    document.getElementById('tag-required-err').style.display = 'block';
    return;
  }
  var btn = document.getElementById('tag-save-btn');
  btn.textContent = '…'; btn.disabled = true;
  var tagsParam = encodeURIComponent(tagEditorSelected.join('|'));
  var cbName = '_ut' + tagEditorRow + '_' + Date.now();
  var script = document.createElement('script');
  window[cbName] = function(data) {
    delete window[cbName];
    if (script.parentNode) script.parentNode.removeChild(script);
    if (!data.ok) {
      btn.textContent = 'Erreur'; btn.disabled = false;
      document.getElementById('tag-save-status').textContent = 'Erreur: ' + (data.error || '');
      return;
    }
    for (var i = 0; i < ITEMS.length; i++) {
      if (ITEMS[i]._row === tagEditorRow) { ITEMS[i].serie = data.serie; break; }
    }
    closeTagEditor(); renderGallery();
  };
  script.onerror = function() { btn.textContent = 'Erreur'; btn.disabled = false; };
  script.src = API_BASE + '?action=updateTags&token=' + encodeURIComponent(ADMIN_NAME) + '&row=' + tagEditorRow + '&tags=' + tagsParam + '&callback=' + cbName;
  document.head.appendChild(script);
}

function addNewTag() {
  var inp = document.getElementById('tag-new-input');
  var errEl = document.getElementById('tag-new-err');
  var tag = inp.value.trim();
  errEl.style.display = 'none';
  if (!tag) return;
  var list = document.getElementById('tag-list');
  var existing = list.querySelectorAll('input[type=checkbox]');
  for (var i = 0; i < existing.length; i++) {
    if (existing[i].getAttribute('data-tag').toLowerCase() === tag.toLowerCase()) {
      errEl.textContent = 'Ce tag existe déjà.'; errEl.style.display = 'block';
      inp.select(); return;
    }
  }
  if (tagEditorSelected.length < 4) tagEditorSelected.push(tag);
  var lbl = document.createElement('label'); lbl.className = 'tag-check-row checked';
  var cb = document.createElement('input');
  cb.type = 'checkbox'; cb.checked = true; cb.setAttribute('data-tag', tag);
  (function(t, label, checkbox) {
    checkbox.onchange = function() {
      if (this.checked) {
        if (tagEditorSelected.length >= 4) { this.checked = false; return; }
        tagEditorSelected.push(t); label.className = 'tag-check-row checked';
      } else {
        tagEditorSelected = tagEditorSelected.filter(function(x) { return x !== t; });
        label.className = 'tag-check-row';
      }
      document.getElementById('tag-count').textContent = tagEditorSelected.length + ' / 5';
    };
  })(tag, lbl, cb);
  lbl.appendChild(cb); lbl.appendChild(document.createTextNode(' ' + tag));
  var inserted = false;
  for (var j = 0; j < existing.length; j++) {
    if (existing[j].getAttribute('data-tag').localeCompare(tag) > 0) {
      list.insertBefore(lbl, existing[j].parentElement); inserted = true; break;
    }
  }
  if (!inserted) list.appendChild(lbl);
  document.getElementById('tag-count').textContent = tagEditorSelected.length + ' / 5';
  inp.value = '';
  var cbName = '_at' + Date.now();
  var script = document.createElement('script');
  window[cbName] = function(data) {
    delete window[cbName];
    if (script.parentNode) script.parentNode.removeChild(script);
    if (data.error) { errEl.textContent = 'Erreur Sheet: ' + data.error; errEl.style.display = 'block'; }
  };
  script.src = API_BASE + '?action=addTag&token=' + encodeURIComponent(ADMIN_NAME) + '&tag=' + encodeURIComponent(tag) + '&callback=' + cbName;
  document.head.appendChild(script);
}

/* ── Admin ── */
function toggleAdmin() {
  if (adminMode) {
    adminMode = false; ADMIN_NAME = '';
    document.body.classList.remove('admin-on');
    var lb = document.getElementById('lock-btn');
    lb.classList.remove('unlocked'); lb.title = 'Administration';
  } else {
    document.getElementById('admin-pwd').value = '';
    document.getElementById('admin-err').textContent = '';
    document.getElementById('admin-modal').style.display = 'flex';
    setTimeout(function(){ document.getElementById('admin-pwd').focus(); }, 50);
  }
}
function closeAdminModal(){ document.getElementById('admin-modal').style.display = 'none'; }
function checkAdmin() {
  var input = document.getElementById('admin-pwd').value.trim().toLowerCase();
  if (VALID_NAMES.indexOf(input) !== -1) {
    ADMIN_NAME = input.charAt(0).toUpperCase() + input.slice(1);
    adminMode = true;
    document.body.classList.add('admin-on');
    var lb = document.getElementById('lock-btn');
    lb.classList.add('unlocked'); lb.title = ADMIN_NAME + ' connecté·e';
    closeAdminModal();
  } else {
    document.getElementById('admin-err').textContent = 'Prénom non reconnu';
    document.getElementById('admin-pwd').value = '';
    document.getElementById('admin-pwd').focus();
  }
}

/* ── Lightbox ── */
function openLB(src) {
  if (!src) return;
  document.getElementById('lb-img').src = src;
  document.getElementById('lb').className = 'open';
  document.body.style.overflow = 'hidden';
}
function closeLB() {
  document.getElementById('lb').className = '';
  document.body.style.overflow = '';
}
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeLB(); });
document.getElementById('lb').addEventListener('click', function(e) {
  if (e.target === document.getElementById('lb')) closeLB();
});
</script>
